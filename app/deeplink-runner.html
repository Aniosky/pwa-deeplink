<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Opening...</title>
    <meta name="theme-color" content="#1a1a2e">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            padding: 24px;
            text-align: center;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid #333; border-top-color: #e94560;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #status-text { color: #aaa; font-size: 1rem; }
        #current-link {
            color: #7ec8e3; font-size: 0.85rem;
            word-break: break-all; max-width: 320px;
        }

        #log {
            margin-top: 16px; width: 100%; max-width: 400px;
            text-align: left; font-size: 0.8rem;
            max-height: 200px; overflow-y: auto;
        }
        .log-entry {
            padding: 6px 10px; border-radius: 6px; margin-bottom: 4px;
        }
        .log-entry.try { background: #16213e; color: #7ec8e3; }
        .log-entry.fail { background: #2e1a1a; color: #e87070; }
        .log-entry.ok { background: #1a2e1a; color: #70e870; }

        #progress-bar {
            width: 100%; max-width: 300px; height: 6px;
            background: #333; border-radius: 3px; overflow: hidden;
        }
        #progress-fill {
            height: 100%; width: 0%;
            background: #e94560; border-radius: 3px;
            transition: width 0.3s ease;
        }
        #step-info { color: #666; font-size: 0.75rem; }
    </style>
</head>
<body>
    <div class="spinner" id="spinner"></div>
    <p id="status-text">Preparing...</p>
    <p id="current-link"></p>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <p id="step-info"></p>
    <div id="log"></div>

    <script src="deeplink-runner.js"></script>
</body>
</html>
