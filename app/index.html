<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PWA Deep Link</title>
    <link rel="manifest" href="/pwa-deeplink/manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { width: 100%; max-width: 420px; padding: 24px; }
        h1 { font-size: 1.5rem; margin-bottom: 24px; text-align: center; }
        .btn {
            display: block; width: 100%; padding: 14px; border: none;
            border-radius: 10px; font-size: 1rem; font-weight: 600;
            cursor: pointer; text-align: center; text-decoration: none;
            margin-bottom: 10px;
        }
        .btn:active { opacity: 0.8; }
        .btn-primary { background: #e94560; color: #fff; }
        .btn-primary:disabled { background: #555; cursor: not-allowed; }
        .btn-secondary { background: #0f3460; color: #7ec8e3; }
        .input-group { margin-top: 16px; }
        .input-group label { display: block; margin-bottom: 6px; font-size: 0.875rem; color: #aaa; }
        .input-group input,
        .input-group textarea {
            width: 100%; padding: 12px 14px;
            border: 1px solid #333; border-radius: 10px;
            background: #16213e; color: #eee; font-size: 1rem; outline: none;
            font-family: inherit;
        }
        .input-group textarea { resize: vertical; line-height: 1.5; }
        .input-group input:focus,
        .input-group textarea:focus { border-color: #e94560; }
        .input-group input::placeholder,
        .input-group textarea::placeholder { color: #555; }
        .status {
            margin-top: 16px; padding: 10px 14px;
            border-radius: 8px; font-size: 0.85rem; display: none;
        }
        .status.info { background: #16213e; border: 1px solid #0f3460; color: #7ec8e3; display: block; }
        .status.error { background: #2e1a1a; border: 1px solid #603030; color: #e87070; display: block; }
        .status.success { background: #1a2e1a; border: 1px solid #306030; color: #70e870; display: block; }
        .hint { margin-top: 12px; font-size: 0.75rem; color: #666; text-align: center; }

        .corr-box {
            margin-bottom: 24px; padding: 18px;
            background: linear-gradient(135deg, #0f3460, #16213e);
            border: 2px solid #e94560;
            border-radius: 14px; text-align: center;
        }
        .corr-label { font-size: 0.8rem; color: #e94560; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .corr-value { font-size: 1.3rem; color: #fff; word-break: break-all; font-family: monospace; font-weight: 700; }
        .corr-source { font-size: 0.7rem; color: #555; margin-top: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Push & Deep Link v2.4</h1>

        <div class="corr-box">
            <div class="corr-label">Correlation ID</div>
            <div id="correlation-value" class="corr-value">—</div>
            <div id="correlation-source" class="corr-source"></div>
        </div>

        <button id="sendPush" class="btn btn-primary">Отправить Push</button>
        <button id="getToken" class="btn btn-secondary">Получить Push-токен</button>

        <div class="input-group">
            <label for="deeplink">Deep Links (по одному на строку)</label>
            <textarea id="deeplink" rows="4" placeholder="myapp://open">invalidapp://nonexistent
myapp://open</textarea>
        </div>

        <div class="input-group">
            <label for="delay">Задержка на попытку (мс)</label>
            <input type="number" id="delay" placeholder="600" value="600" min="0" max="5000" step="100">
        </div>

        <div id="status" class="status"></div>
        <p class="hint">Push открывает страницу перебора, которая пробует каждый deeplink по очереди.<br>Первый успешный — побеждает. Если все провалились — попытка открыть в PWA.</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
