<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PWA Deep Link</title>
    <link rel="manifest" href="/pwa-deeplink/manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { width: 100%; max-width: 420px; padding: 24px; }
        h1 { font-size: 1.5rem; margin-bottom: 24px; text-align: center; }
        .btn {
            display: block; width: 100%; padding: 14px; border: none;
            border-radius: 10px; font-size: 1rem; font-weight: 600;
            cursor: pointer; text-align: center; text-decoration: none;
        }
        .btn:active { opacity: 0.8; }
        .btn-primary { background: #e94560; color: #fff; }
        .btn-primary:disabled { background: #555; cursor: not-allowed; }
        .input-group { margin-top: 16px; }
        .input-group label { display: block; margin-bottom: 6px; font-size: 0.875rem; color: #aaa; }
        .input-group input,
        .input-group textarea {
            width: 100%; padding: 12px 14px;
            border: 1px solid #333; border-radius: 10px;
            background: #16213e; color: #eee; font-size: 1rem; outline: none;
            font-family: inherit;
        }
        .input-group textarea { resize: vertical; line-height: 1.5; }
        .input-group input:focus,
        .input-group textarea:focus { border-color: #e94560; }
        .input-group input::placeholder,
        .input-group textarea::placeholder { color: #555; }
        .status {
            margin-top: 16px; padding: 10px 14px;
            border-radius: 8px; font-size: 0.85rem; display: none;
        }
        .status.info { background: #16213e; border: 1px solid #0f3460; color: #7ec8e3; display: block; }
        .status.error { background: #2e1a1a; border: 1px solid #603030; color: #e87070; display: block; }
        .status.success { background: #1a2e1a; border: 1px solid #306030; color: #70e870; display: block; }
        .hint { margin-top: 12px; font-size: 0.75rem; color: #666; text-align: center; }

    </style>
</head>
<body>
    <div class="container">
        <h1>Push & Deep Link v2.2</h1>

        <div id="uuid-box" style="margin-bottom:12px; padding:14px; background:#16213e; border:1px solid #0f3460; border-radius:10px; text-align:center;">
            <div style="font-size:0.75rem; color:#666; margin-bottom:4px;">Client UUID</div>
            <div id="uuid-value" style="font-size:0.95rem; color:#7ec8e3; word-break:break-all; font-family:monospace;"></div>
            <div id="uuid-source" style="font-size:0.7rem; color:#555; margin-top:4px;"></div>
        </div>

        <div id="correlation-box" style="margin-bottom:20px; padding:14px; background:#16213e; border:1px solid #0f3460; border-radius:10px; text-align:center;">
            <div style="font-size:0.75rem; color:#666; margin-bottom:4px;">Correlation ID</div>
            <div id="correlation-value" style="font-size:0.95rem; color:#e9a560; word-break:break-all; font-family:monospace;">—</div>
            <div id="correlation-source" style="font-size:0.7rem; color:#555; margin-top:4px;"></div>
        </div>

        <button id="sendPush" class="btn btn-primary">Send Push Notification</button>

        <div class="input-group">
            <label for="deeplink">Deep Links (one per line)</label>
            <textarea id="deeplink" rows="4" placeholder="myapp://open">invalidapp://nonexistent
myapp://open</textarea>
        </div>

        <div class="input-group">
            <label for="delay">Delay per attempt (ms)</label>
            <input type="number" id="delay" placeholder="600" value="600" min="0" max="5000" step="100">
        </div>

        <div id="status" class="status"></div>
        <p class="hint">Push opens a runner page that tries each deeplink in order.<br>First success wins. If all fail — fallback page is shown.</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
