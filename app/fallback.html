<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Fallback</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 24px;
            padding: 24px;
            text-align: center;
        }
        .cat { font-size: 6rem; line-height: 1; }
        h1 { font-size: 1.5rem; color: #e94560; }
        p { color: #888; font-size: 1rem; max-width: 300px; }
        a {
            display: inline-block;
            padding: 12px 24px;
            background: #0f3460;
            color: #7ec8e3;
            text-decoration: none;
            border-radius: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="cat">&#128557;</div>
    <h1>Is fallback page</h1>
    <p>The native app was not found on this device.</p>
    <a href="/app/">Back</a>
</body>
</html>
